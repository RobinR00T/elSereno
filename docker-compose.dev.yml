services:
  db:
    image: postgres:16.3-alpine3.20         # pin exacto (PITF-035)
    environment:
      POSTGRES_DB: elsereno
      POSTGRES_USER: elsereno
      POSTGRES_HOST_AUTH_METHOD: trust      # ONLY dev; loopback-bound
    ports:
      - "127.0.0.1:5433:5432"               # explicit loopback bind (PITF-020)
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elsereno -d elsereno"]
      interval: 5s
      timeout: 3s
      retries: 10

  adminer:
    image: adminer:4.8.1                    # pin exacto (PITF-035)
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
