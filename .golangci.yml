version: "2"

run:
  timeout: 10m
  build-tags:
    - offensive
    - integration
    - e2e
    - chaos
    - sandbox_integration
  modules-download-mode: readonly

linters:
  default: none
  enable:
    # Correctness
    - govet
    - errcheck
    - staticcheck
    - unused
    - ineffassign
    # Security
    - gosec
    - forcetypeassert
    # Style & complexity
    - gocritic
    - revive
    - gocyclo
    - funlen
    - dupl
    - misspell
    - goconst
    - unconvert
    - unparam
    - tagalign
    # Error handling
    - nilerr
    - errorlint
    - exhaustive
    - wastedassign
    # Context & concurrency
    - contextcheck
    - containedctx
    - noctx
    - tparallel
    # Resource leaks
    - bodyclose
    - rowserrcheck
    - sqlclosecheck
    # Formatting / hygiene
    - whitespace
  settings:
    gocyclo:
      min-complexity: 15
    funlen:
      lines: 60
      statements: 40
    exhaustive:
      default-signifies-exhaustive: true
    errorlint:
      errorf: true
      asserts: true
      comparison: true
    misspell:
      locale: UK
    revive:
      rules:
        - name: exported
        - name: indent-error-flow
        - name: unused-parameter
        - name: var-naming
        - name: context-as-argument
        - name: context-keys-type
  exclusions:
    rules:
      # Tests: funlen / dupl / gocyclo relaxed.
      - path: _test\.go
        linters:
          - funlen
          - dupl
          - gocyclo
          - errcheck
          - goconst
      # doc.go files often repeat package-level prose; dupl noise.
      - path: doc\.go
        linters:
          - dupl
      # HTML templates use CSS property names (color, center, …) that
      # are invariant across locales; misspell's UK dictionary fights
      # them. Exempt the HTML output package and the web handlers
      # that inline HTML.
      - path: internal/outputs/html/
        linters:
          - misspell
      - path: internal/web/handlers/
        linters:
          - misspell
      # The TUI calls into charmbracelet/lipgloss whose API exposes
      # `lipgloss.Color(...)` — an upstream symbol we can't rename.
      # Same situation as CSS: locale-invariant external API.
      - path: internal/tui/
        linters:
          - misspell
      # Linux-only sandbox plumbing: BPF/seccomp + syscall maps.
      # Field names mirror the kernel header (Pivot_root, Kexec_load,
      # …); G115 conversions are BPF imm-field bit shuffling; G103
      # uses unsafe.Pointer for the syscall.Syscall6 boundary; G702
      # appears in sandbox_integration_test.go tests which run real
      # commands by design. Pre-existing and not addressed by any
      # v1.89+ change; excluded to keep the audit gate green
      # without weakening the global rule for other code.
      - path: offensive/sandbox/syscalls_linux\.go
        linters:
          - revive
          - dupl
          - gofmt
          - goimports
      - path: offensive/sandbox/bpf_linux\.go
        linters:
          - gosec
          - goconst
      - path: offensive/sandbox/bpf_linux_test\.go
        linters:
          - gosec
          - errorlint
      - path: offensive/sandbox/sandbox_integration_test\.go
        linters:
          - gosec
          - noctx

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - local/elsereno

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
