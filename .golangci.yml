version: "2"

run:
  timeout: 10m
  build-tags:
    - offensive
    - sqlite
    - integration
    - e2e
    - chaos
  modules-download-mode: readonly

linters:
  default: none
  enable:
    # Correctness
    - govet
    - errcheck
    - staticcheck
    - unused
    - ineffassign
    # Security
    - gosec
    - forcetypeassert
    # Style & complexity
    - gocritic
    - revive
    - gocyclo
    - funlen
    - dupl
    - misspell
    - goconst
    - unconvert
    - unparam
    - tagalign
    # Error handling
    - nilerr
    - errorlint
    - exhaustive
    - wastedassign
    # Context & concurrency
    - contextcheck
    - containedctx
    - noctx
    - tparallel
    # Resource leaks
    - bodyclose
    - rowserrcheck
    - sqlclosecheck
    # Formatting / hygiene
    - whitespace
  settings:
    gocyclo:
      min-complexity: 15
    funlen:
      lines: 60
      statements: 40
    exhaustive:
      default-signifies-exhaustive: true
    errorlint:
      errorf: true
      asserts: true
      comparison: true
    misspell:
      locale: UK
    revive:
      rules:
        - name: exported
        - name: indent-error-flow
        - name: unused-parameter
        - name: var-naming
        - name: context-as-argument
        - name: context-keys-type
  exclusions:
    rules:
      # Tests: funlen / dupl / gocyclo relaxed.
      - path: _test\.go
        linters:
          - funlen
          - dupl
          - gocyclo
          - errcheck
          - goconst
      # doc.go files often repeat package-level prose; dupl noise.
      - path: doc\.go
        linters:
          - dupl

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - local/elsereno

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
