version: 2

project_name: elsereno

before:
  hooks:
    - go mod tidy
    - go mod verify

builds:
  - id: elsereno-default
    main: ./cmd/elsereno
    binary: elsereno
    env:
      - CGO_ENABLED=0
      - GOFLAGS=-mod=readonly
    flags:
      - -trimpath
      - -buildvcs=false
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    goos: [linux, darwin]
    goarch: [amd64, arm64]

  - id: elsereno-offensive
    main: ./cmd/elsereno
    binary: elsereno-offensive
    env:
      - CGO_ENABLED=0
      - GOFLAGS=-mod=readonly
    flags:
      - -trimpath
      - -buildvcs=false
      - -tags=offensive
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    goos: [linux, darwin]
    goarch: [amd64, arm64]

  - id: elsereno-sqlite
    main: ./cmd/elsereno
    binary: elsereno-sqlite
    env:
      - CGO_ENABLED=1
    flags:
      - -trimpath
      - -buildvcs=false
      - -tags=sqlite
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    # SQLite variant is CGO; only ship the runner's native arch (ADR-012, PITF-006).
    goos: [linux]
    goarch: [amd64]

archives:
  - id: default
    # goreleaser v2: `builds` was renamed to `ids` for archive filters.
    ids:
      - elsereno-default
      - elsereno-offensive
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - SECURITY.md
      - LEGAL.md
      - NON-GOALS.md
      - man/man1/*.1
      - man/man5/*.5
      - man/man7/*.7
      - completions/*

  - id: sqlite
    ids:
      - elsereno-sqlite
    name_template: "{{ .ProjectName }}_{{ .Version }}_sqlite_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^chore:"
      - "^docs:"
      - "^test:"

# GHCR image publishing deferred to post-1.0 (needs buildx driver
# setup for --attest SBOM + org/repo rewrite to match the actual
# RobinR00T/elSereno slug). v1.0.0 ships archives + SBOM + cosign +
# SLSA; the docker image lands in the first v1.1 release.
#
# dockers_v2:
#   - id: elsereno
#     images: ["ghcr.io/robinr00t/elsereno"]
#     tags: ["{{ .Version }}", latest]
#     dockerfile: Dockerfile
#     platforms: [linux/amd64]

sboms:
  - artifacts: archive
    # `cyclonedx-gomod mod` expects a Go module directory, not the
    # packaged archive — it errors "not a go module" when pointed
    # at the .tar.gz. syft walks the archive contents and emits
    # CycloneDX directly. Both tools are installed by the release
    # workflow (`anchore/sbom-action/download-syft@v0`).
    documents:
      - "{{ .ArtifactName }}.cyclonedx.json"
    cmd: syft
    args: ["scan", "$artifact", "-o", "cyclonedx-json=$document"]

signs:
  - cmd: cosign
    artifacts: checksum
    # The --bundle output packages the signature + transparency-log
    # entry + signing certificate into one JSON so verifiers can
    # run `cosign verify-blob --bundle <path> …` without fetching
    # the certificate out-of-band. The raw `.sig` is still emitted
    # for receivers that only want the bare signature.
    args:
      - "sign-blob"
      - "--yes"
      - "--output-signature=${signature}"
      - "--bundle=${artifact}.bundle"
      - "${artifact}"

# SLSA L3 provenance generation. The release workflow
# (.github/workflows/release.yml) wraps goreleaser with
# slsa-framework/slsa-github-generator so every archive has a
# signed in-toto v1 attestation at
# `<artefact>.intoto.jsonl`. The supply-chain workflow's
# `provenance-verify` job runs `slsa-verifier verify-artifact`
# on every tag push to prove the attestation chain is intact.
release:
  draft: false
  replace_existing_artifacts: true
  footer: |
    ## Supply-chain verification

    ```
    cosign verify-blob \
      --bundle checksums.txt.bundle \
      --certificate-identity-regexp 'https://github.com/{{ .Env.GITHUB_REPOSITORY }}/.*' \
      --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
      checksums.txt

    slsa-verifier verify-artifact <artefact> \
      --provenance-path <artefact>.intoto.jsonl \
      --source-uri github.com/{{ .Env.GITHUB_REPOSITORY }} \
      --source-tag {{ .Tag }}
    ```
