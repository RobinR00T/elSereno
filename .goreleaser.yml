version: 2

project_name: elsereno

before:
  hooks:
    - go mod tidy
    - go mod verify

builds:
  - id: elsereno-default
    main: ./cmd/elsereno
    binary: elsereno
    env:
      - CGO_ENABLED=0
      - GOFLAGS=-mod=readonly
    flags:
      - -trimpath
      - -buildvcs=false
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    goos: [linux, darwin]
    goarch: [amd64, arm64]

  - id: elsereno-offensive
    main: ./cmd/elsereno
    binary: elsereno-offensive
    env:
      - CGO_ENABLED=0
      - GOFLAGS=-mod=readonly
    flags:
      - -trimpath
      - -buildvcs=false
      - -tags=offensive
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    goos: [linux, darwin]
    goarch: [amd64, arm64]

  # v1.29 chunk 1: mini variant for embedded / device deployments.
  # Built with -tags=mini, which excludes the dashboard HTTP
  # server, the OpenAPI machinery, and (after v1.29 chunks 2-5)
  # the TUI. The remaining surface (28 plugins, scanner, audit
  # chain, NDJSON / CSV / CEF / syslog / JIRA / GitHub / webhook
  # outputs, vault, discover, triage, all 9 input providers) is
  # identical to the default build.
  - id: elsereno-mini
    main: ./cmd/elsereno
    binary: elsereno-mini
    env:
      - CGO_ENABLED=0
      - GOFLAGS=-mod=readonly
    flags:
      - -trimpath
      - -buildvcs=false
      - -tags=mini
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    goos: [linux, darwin]
    goarch: [amd64, arm64]

archives:
  - id: default
    # goreleaser v2: `builds` was renamed to `ids` for archive filters.
    ids:
      - elsereno-default
      - elsereno-offensive
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - SECURITY.md
      - LEGAL.md
      - NON-GOALS.md
      - man/man1/*.1
      - man/man5/*.5
      - man/man7/*.7
      - completions/*

  # v1.29 chunk 1: mini archive — separate tarball so device
  # operators don't pull the full default + offensive binaries
  # they don't need. Smaller dependency surface = smaller
  # attack surface.
  - id: mini
    ids:
      - elsereno-mini
    name_template: "{{ .ProjectName }}-mini_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - SECURITY.md
      - NON-GOALS.md
      - man/man1/elsereno.1

# v1.49: distro-native packages (deb / rpm / apk). Lets
# operators install via `apt install ./elsereno_<ver>.deb`
# or `dnf install ./elsereno-<ver>.rpm` instead of dropping
# the static binary into /usr/local/bin by hand.
#
# Three packages per (arch, format):
#   - elsereno          (default-build binary; SOC use case)
#   - elsereno-offensive (operator pen-test build; pulls in
#     the same systemd units but the binary is /usr/bin/
#     elsereno-offensive)
#   - elsereno-mini     (device deployment; no systemd unit
#     because mini's `serve` is a stub)
#
# All three install:
#   /usr/share/doc/elsereno/elsereno.yaml.sample
#   /etc/elsereno/elsereno.yaml         (config sample, 0640)
#   man pages
#   shell completions
#
# Default + offensive additionally install:
#   /usr/lib/systemd/system/elsereno-serve.service
#   /usr/lib/systemd/system/elsereno-audit.service
#   /usr/lib/tmpfiles.d/elsereno.conf
nfpms:
  - id: elsereno-default
    package_name: elsereno
    ids: [elsereno-default]
    vendor: ElSereno
    homepage: https://github.com/RobinR00T/elSereno
    maintainer: ElSereno maintainers <noreply@elsereno.dev>
    description: |-
      ICS/OT legacy exposure auditor — fingerprinter,
      scanner, dashboard, and HTTP API. Default
      (read-only) build. The offensive variant ships
      writes / exploits / harvest / dial behind triple-
      confirm fences in a separate package
      (elsereno-offensive).
    license: Apache-2.0
    formats: [deb, rpm, apk]
    bindir: /usr/bin
    contents:
      - src: packaging/systemd/elsereno-serve.service
        dst: /usr/lib/systemd/system/elsereno-serve.service
        file_info:
          mode: 0644
      - src: packaging/systemd/elsereno-audit.service
        dst: /usr/lib/systemd/system/elsereno-audit.service
        file_info:
          mode: 0644
      - src: packaging/configs/elsereno.tmpfiles.conf
        dst: /usr/lib/tmpfiles.d/elsereno.conf
        file_info:
          mode: 0644
      - src: packaging/configs/elsereno.yaml.sample
        dst: /etc/elsereno/elsereno.yaml
        type: config|noreplace
        file_info:
          mode: 0640
      - src: packaging/configs/elsereno.yaml.sample
        dst: /usr/share/doc/elsereno/elsereno.yaml.sample
        file_info:
          mode: 0644
      - src: LICENSE
        dst: /usr/share/doc/elsereno/LICENSE
      - src: README.md
        dst: /usr/share/doc/elsereno/README.md
      - src: SECURITY.md
        dst: /usr/share/doc/elsereno/SECURITY.md
      - src: LEGAL.md
        dst: /usr/share/doc/elsereno/LEGAL.md
      - src: man/man1/elsereno.1
        dst: /usr/share/man/man1/elsereno.1
    scripts:
      preinstall: packaging/scripts/preinstall.sh
      postinstall: packaging/scripts/postinstall.sh
      preremove: packaging/scripts/preremove.sh
    overrides:
      deb:
        dependencies:
          - libcap2-bin
        recommends:
          - postgresql-client
      rpm:
        dependencies:
          - libcap

  - id: elsereno-offensive
    package_name: elsereno-offensive
    ids: [elsereno-offensive]
    vendor: ElSereno
    homepage: https://github.com/RobinR00T/elSereno
    maintainer: ElSereno maintainers <noreply@elsereno.dev>
    description: |-
      ICS/OT legacy exposure auditor — offensive build
      (writes / exploits / harvest / dial behind triple-
      confirm fences). Ships alongside the default
      package; binary lives at /usr/bin/elsereno-offensive
      so both can coexist on the same host.
    license: Apache-2.0
    formats: [deb, rpm, apk]
    bindir: /usr/bin
    contents:
      - src: LICENSE
        dst: /usr/share/doc/elsereno-offensive/LICENSE
      - src: README.md
        dst: /usr/share/doc/elsereno-offensive/README.md
      - src: LEGAL.md
        dst: /usr/share/doc/elsereno-offensive/LEGAL.md

  - id: elsereno-mini
    package_name: elsereno-mini
    ids: [elsereno-mini]
    vendor: ElSereno
    homepage: https://github.com/RobinR00T/elSereno
    maintainer: ElSereno maintainers <noreply@elsereno.dev>
    description: |-
      ICS/OT legacy exposure auditor — mini build for
      device deployments. Excludes the dashboard +
      OpenAPI + TUI to keep the binary small. No systemd
      unit (serve is a stub in mini). Operators run
      `elsereno-mini scan` / `discover` / `audit
      verify-file` directly.
    license: Apache-2.0
    formats: [deb, rpm, apk]
    bindir: /usr/bin
    contents:
      - src: LICENSE
        dst: /usr/share/doc/elsereno-mini/LICENSE
      - src: README.md
        dst: /usr/share/doc/elsereno-mini/README.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^chore:"
      - "^docs:"
      - "^test:"

# Docker image publishing (v1.1 chunk 5). Uses buildx so SBOM +
# provenance attestations attach to the manifest. The repo slug
# `ghcr.io/robinr00t/elsereno` is lowercase-forced because Docker
# rejects uppercase in names (GHCR is case-insensitive, but the
# owner login `RobinR00T` must be lowercased for the docker push).
#
# Publishing is keyed by GitHub OIDC → ghcr.io login in
# `.github/workflows/release.yml` (docker/login-action). A
# post-release step also signs the pushed manifest with cosign
# keyless so `cosign verify ghcr.io/robinr00t/elsereno:vX.Y.Z`
# succeeds out of the box.
dockers_v2:
  - id: elsereno
    images:
      - "ghcr.io/robinr00t/elsereno"
    tags:
      - "{{ .Version }}"
      - latest
    dockerfile: Dockerfile
    platforms:
      - linux/amd64
      - linux/arm64
    # OCI image labels. goreleaser v2 fills `.Date`, `.FullCommit`,
    # `.Version` from the tag + workflow environment; `.Env.GITHUB_REPOSITORY`
    # (set by GitHub Actions to `<owner>/<repo>`) gives us a working
    # source/url link even when the repo is renamed.
    labels:
      org.opencontainers.image.created: "{{ .Date }}"
      org.opencontainers.image.title: "{{ .ProjectName }}"
      org.opencontainers.image.description: "ElSereno ICS/OT exposure auditor"
      org.opencontainers.image.url: "https://github.com/{{ .Env.GITHUB_REPOSITORY }}"
      org.opencontainers.image.source: "https://github.com/{{ .Env.GITHUB_REPOSITORY }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.licenses: "Apache-2.0"
    # dockers_v2's `sbom: true` emits a buildx `--attest=type=sbom`
    # automatically. The matching cosign-verifiable bundle lands as
    # an OCI referrer entry so `cosign download sbom ghcr.io/…@digest`
    # returns the CycloneDX tree.
    sbom: true
    # Extra `docker buildx build` flags. `--pull` makes sure the
    # distroless base is refreshed every tag; provenance
    # attestation captures the build steps + invocation so SLSA
    # level 3 still holds end-to-end once we drop the v1.2 rework
    # of the release workflow.
    flags:
      - "--pull"
      - "--attest=type=provenance,mode=max"

# cosign the pushed manifest so `cosign verify ghcr.io/...` works
# without extra operator steps. The SBOM attestation added by
# `--attest=type=sbom` above lives INSIDE the manifest; the
# docker_signs block below wraps a Sigstore signature around the
# manifest itself (OCI referrer entry in the registry).
docker_signs:
  - cmd: cosign
    artifacts: manifests
    args:
      - "sign"
      - "--yes"
      - "${artifact}@${digest}"

sboms:
  - artifacts: archive
    # `cyclonedx-gomod mod` expects a Go module directory, not the
    # packaged archive — it errors "not a go module" when pointed
    # at the .tar.gz. syft walks the archive contents and emits
    # CycloneDX directly. Both tools are installed by the release
    # workflow (`anchore/sbom-action/download-syft@v0`).
    documents:
      - "{{ .ArtifactName }}.cyclonedx.json"
    cmd: syft
    args: ["scan", "$artifact", "-o", "cyclonedx-json=$document"]

signs:
  # Bundle-only sign: goreleaser v2 uploads exactly one file per
  # signs block (whatever `signature:` declares), so we use the
  # cosign bundle file as the primary signature artefact. That
  # bundle packs signature + transparency-log entry + signing
  # certificate in one JSON, letting receivers run
  # `cosign verify-blob --bundle <path> …` without a second
  # round-trip for the certificate.
  - cmd: cosign
    artifacts: checksum
    signature: "${artifact}.bundle"
    args:
      - "sign-blob"
      - "--yes"
      - "--bundle=${signature}"
      - "${artifact}"
  # Legacy raw `.sig` for consumers of older cosign releases
  # (pre-v2) that only read the bare signature. goreleaser keeps
  # both files in dist/ and uploads both.
  - id: cosign-sig
    cmd: cosign
    artifacts: checksum
    signature: "${artifact}.sig"
    args:
      - "sign-blob"
      - "--yes"
      - "--output-signature=${signature}"
      - "${artifact}"

# SLSA L3 provenance generation. Since v1.2 the release
# workflow uses `actions/attest-build-provenance@v2` (GitHub
# Attestations API) to mint SLSA v1.0 predicates for every
# archive + checksums.txt. That dropped the
# `slsa-framework/slsa-github-generator` reusable workflow
# whose `final` step had an exit-27 bug (upstream 2610) across
# v1.0.1 + v1.1.0.
release:
  draft: false
  replace_existing_artifacts: true
  footer: |
    ## Supply-chain verification

    ```
    cosign verify-blob \
      --bundle checksums.txt.bundle \
      --certificate-identity-regexp 'https://github.com/{{ .Env.GITHUB_REPOSITORY }}/.*' \
      --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
      checksums.txt

    # SLSA v1.0 build provenance (v1.2+ via GitHub Attestations API):
    gh attestation verify <artefact> --repo {{ .Env.GITHUB_REPOSITORY }}
    ```
