services:
  db:
    # Pin exact tag (PITF-035). Matches docker-compose.dev.yml but
    # runs on a distinct port so the integration suite never collides
    # with an operator's dev DB.
    image: postgres:16.3-alpine3.20
    environment:
      POSTGRES_DB: elsereno
      POSTGRES_USER: elsereno
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - pgdata-test:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elsereno -d elsereno"]
      interval: 2s
      timeout: 2s
      retries: 30

  banner-sim:
    image: alpine:3.20.3
    command: >
      sh -c "apk add --no-cache socat >/dev/null 2>&1 &&
             printf 'ELSERENO-SIM-BANNER\\r\\n' |
             socat -u - TCP-LISTEN:9999,fork,reuseaddr,bind=0.0.0.0"
    ports:
      - "127.0.0.1:9999:9999"

  # Conpot is a low-interaction ICS honeypot that serves a broad set of
  # protocols out of the box (Modbus, S7, BACnet, IPMI, HTTP). We use
  # it so the F4 integration suite can drive every protocol plugin
  # against a deterministic peer without wiring nine separate
  # simulators.
  conpot:
    image: honeynet/conpot:latest
    environment:
      # Disable the template selection prompt.
      CONPOT_TEMPLATE: default
    ports:
      - "127.0.0.1:1502:502"      # Modbus/TCP
      - "127.0.0.1:10002:102"     # S7comm (TPKT/COTP)
      - "127.0.0.1:44819:44818"   # EtherNet/IP CIP
      - "127.0.0.1:47809:47808/udp" # BACnet/IP (UDP)
      - "127.0.0.1:50794:5094"    # HART-IP
      - "127.0.0.1:60870:2404"    # IEC 60870-5-104
      - "127.0.0.1:11911:1911"    # Niagara Fox
      - "127.0.0.1:20001:10001"   # Veeder-Root ATG (via conpot's guardian-ast emulation)

volumes:
  pgdata-test:
