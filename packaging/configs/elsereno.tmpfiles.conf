# systemd-tmpfiles config installed by the elsereno package.
# Creates the runtime + state directories the units need.
# Re-applied on every boot via systemd-tmpfiles-setup.service.

# Runtime socket dir for `elsereno audit serve`.
d /run/elsereno              0750 elsereno elsereno -

# Persistent state dir (audit chain, vault, run history).
d /var/lib/elsereno          0750 elsereno elsereno -

# Log dir for the daemons.
d /var/log/elsereno          0750 elsereno elsereno -
