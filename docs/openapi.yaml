components:
  schemas:
    Envelope:
      properties:
        data: {}
        schema:
          example: api:v1
          type: string
      required:
        - schema
        - data
      type: object
    Plugin:
      properties:
        build:
          enum:
            - default
            - offensive
          type: string
        default_port:
          type: integer
        description:
          type: string
        name:
          type: string
        version:
          type: string
      required:
        - name
        - build
        - default_port
        - version
      type: object
info:
  description: Read-only HTTP API for ElSereno's dashboard. All endpoints return JSON with a `schema` discriminator so downstream tools can version against a concrete contract. Bearer token auth (ADR-014) gates /api/v1/* when the dashboard's auth mode is enabled.
  title: ElSereno HTTP API
  version: dev
openapi: 3.1.0
paths:
  /api/v1/findings:
    get:
      description: 'Query params: severity, protocol, min_score, created_after (RFC3339), limit (clamped 1..500, default 50). Returned order is created_at DESC; paginate by passing the oldest returned row''s created_at back as created_after.'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
          description: Envelope payload.
        "503":
          description: DB backend unavailable.
      summary: List findings (DB-backed, cursor-paginated).
      tags:
        - findings
  /api/v1/health:
    get:
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
          description: Envelope payload.
      summary: API-level health with server timestamp.
      tags:
        - health
  /api/v1/openapi.yaml:
    get:
      responses:
        "200":
          description: OpenAPI 3.1 YAML document.
      summary: Return this OpenAPI 3.1 spec.
      tags:
        - meta
  /api/v1/plugins:
    get:
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
          description: Envelope payload.
      summary: List plugins registered in this build.
      tags:
        - plugins
  /api/v1/runs:
    get:
      description: 'Query params: status, started_after (RFC3339), limit (1..100, default 20).'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
          description: Envelope payload.
        "503":
          description: DB backend unavailable.
      summary: List recent scan runs with per-run finding counts.
      tags:
        - runs
  /api/v1/scoring:
    get:
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
          description: Envelope payload.
      summary: Default scoring weights + severity thresholds.
      tags:
        - scoring
  /api/v1/stream:
    get:
      description: 'text/event-stream with `event:`, `id:`, `data:` lines. Event kinds: `finding`, `run_start`, `run_end`, `audit`. Payloads are JSON objects; schema per-kind is documented in internal/web/stream/findings_bridge.go.'
      responses:
        "200":
          description: SSE-framed event stream.
        "503":
          description: Live feed unavailable (broadcaster not wired).
      summary: Server-Sent Events feed (findings / runs / audit).
      tags:
        - stream
  /api/v1/triage:
    get:
      description: Returns an array of {severity, count} objects, ordered critical → info. Empty severities are omitted.
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
          description: Envelope payload.
        "503":
          description: DB backend unavailable.
      summary: Per-severity finding counts for the triage panel.
      tags:
        - triage
  /healthz:
    get:
      responses:
        "200":
          description: Process is up.
      summary: Liveness probe.
  /readyz:
    get:
      responses:
        "200":
          description: Ready to serve traffic (degraded without DB).
      summary: Readiness probe.
servers:
  - url: http://127.0.0.1:8787
