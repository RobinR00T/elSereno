components:
  schemas:
    Envelope:
      properties:
        data: {}
        schema:
          example: api:v1
          type: string
      required:
        - schema
        - data
      type: object
    Plugin:
      properties:
        build:
          enum:
            - default
            - offensive
          type: string
        default_port:
          type: integer
        description:
          type: string
        name:
          type: string
        version:
          type: string
      required:
        - name
        - build
        - default_port
        - version
      type: object
info:
  description: Read-only HTTP API for ElSereno's dashboard. All endpoints return JSON with a `schema` discriminator so downstream tools can version against a concrete contract. Bearer token auth (ADR-014) gates /api/v1/* when the dashboard's auth mode is enabled.
  title: ElSereno HTTP API
  version: dev
openapi: 3.1.0
paths:
  /api/v1/findings:
    get:
      description: 'Query params: severity, protocol, min_score, created_after (RFC3339), limit (clamped 1..500, default 50). Returned order is created_at DESC; paginate by passing the oldest returned row''s created_at back as created_after.'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
          description: Envelope payload.
        "503":
          description: DB backend unavailable.
      summary: List findings (DB-backed, cursor-paginated).
      tags:
        - findings
  /api/v1/health:
    get:
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
          description: Envelope payload.
      summary: API-level health with server timestamp.
      tags:
        - health
  /api/v1/inputs/preview:
    get:
      description: 'Query params: kind=list:<path>|nmap:<path>|stdin (required), default_port=<int> (optional, host-only entries fall back here). Returns {count, targets[], truncated}; sample is capped at 200 entries. Provider kinds (shodan/censys/fofa/zoomeye/onyphe/internetdb) are NOT in scope here — they need credentials + rate-limit tuning that the dashboard process intentionally doesn''t carry; use the CLI scan verb for those. v1.36+.'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
          description: Envelope payload.
        "400":
          description: Missing kind, unsupported kind (provider kinds are rejected), or bad default_port.
        "404":
          description: 'list:/nmap: path doesn''t exist.'
        "500":
          description: Parse failure inside the underlying parser.
      summary: Preview targets parsed from an input source (no scan).
      tags:
        - inputs
  /api/v1/openapi.yaml:
    get:
      responses:
        "200":
          description: OpenAPI 3.1 YAML document.
      summary: Return this OpenAPI 3.1 spec.
      tags:
        - meta
  /api/v1/plugins:
    get:
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
          description: Envelope payload.
      summary: List plugins registered in this build.
      tags:
        - plugins
  /api/v1/runs:
    get:
      description: 'Query params: status, started_after (RFC3339), limit (1..100, default 20).'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
          description: Envelope payload.
        "503":
          description: DB backend unavailable.
      summary: List recent scan runs with per-run finding counts.
      tags:
        - runs
  /api/v1/schedules:
    get:
      description: Returns every schedule sorted by name. `next_fire_at` is computed per response (v1.77+).
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
          description: Envelope payload.
      summary: List scan schedules (v1.70+).
      tags:
        - schedules
    post:
      description: 'Body: CreateScheduleRequest. Cadence is mutually-exclusive interval_seconds OR cron_expr (v1.73+). Optional timezone (IANA, v1.75+). Optional audit_retention_days (v1.89+) per-schedule retention override (0=inherit global).'
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
          description: Schedule created.
        "400":
          description: Validation error (name/template/cadence/cron/tz/retention).
        "503":
          description: Schedule store unavailable.
      summary: Create a scan schedule.
      tags:
        - schedules
  /api/v1/schedules/{id}:
    delete:
      responses:
        "204":
          description: Deleted.
        "404":
          description: Schedule not found.
        "503":
          description: Schedule store unavailable.
      summary: Delete a schedule. Audit row persists with schedule_id NULL (v1.88+).
      tags:
        - schedules
    get:
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
          description: Envelope payload.
        "404":
          description: Schedule not found.
        "503":
          description: Schedule store unavailable.
      summary: Get one schedule.
      tags:
        - schedules
    put:
      description: 'Body: UpdateScheduleRequest (same shape as Create minus operator). Optional If-Match header (RFC3339 of stored updated_at; v1.78+) → 412 on mismatch. Optional X-Schedule-Force-Overwrite: true → audit force-overwrite event (v1.84+).'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
          description: Updated schedule.
        "400":
          description: Validation error.
        "404":
          description: Schedule not found.
        "412":
          description: Optimistic-locking precondition failed (If-Match mismatch).
        "503":
          description: Schedule store unavailable.
      summary: Update a schedule (v1.74+).
      tags:
        - schedules
  /api/v1/schedules/{id}/audit:
    get:
      description: 'Returns events newest-first. event_types: force_overwrite, delete, set_enabled_true, set_enabled_false.'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
          description: Envelope payload.
        "404":
          description: Schedule not found.
        "503":
          description: Schedule store unavailable.
      summary: List audit events for a schedule (v1.84+).
      tags:
        - schedules
  /api/v1/schedules/{id}/clone:
    post:
      description: 'Optional body: CloneScheduleRequest with override fields (name, cadence, audit_retention_days). Default name is `<source.name> (copy)`. Clone always starts Enabled=true; LastFiredAt reset; operator = the cloner.'
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
          description: Clone created.
        "400":
          description: Validation error.
        "404":
          description: Source schedule not found.
        "503":
          description: Schedule store unavailable.
      summary: Duplicate a schedule (v1.93+).
      tags:
        - schedules
  /api/v1/schedules/{id}/disable:
    post:
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
          description: Envelope payload.
        "404":
          description: Schedule not found.
        "503":
          description: Schedule store unavailable.
      summary: Disable a schedule. Writes audit (v1.88+).
      tags:
        - schedules
  /api/v1/schedules/{id}/enable:
    post:
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
          description: Envelope payload.
        "404":
          description: Schedule not found.
        "503":
          description: Schedule store unavailable.
      summary: Enable a schedule. Writes audit (v1.88+).
      tags:
        - schedules
  /api/v1/schedules/{id}/runs:
    get:
      description: 'Query param: limit (1..1000, default 50). Returns []Job sorted newest-first via the triggered_by_schedule_id linkage (migration 00014).'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
          description: Envelope payload.
        "404":
          description: Schedule not found.
        "503":
          description: Schedule store unavailable.
      summary: List scheduler-fired jobs for a schedule (v1.92+).
      tags:
        - schedules
  /api/v1/schedules/audit:
    delete:
      description: Operator must opt into a cutoff explicitly. Returns {deleted_count, cutoff}.
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
          description: Prune result.
        "400":
          description: Missing or malformed ?before.
        "503":
          description: Audit store unavailable.
      summary: Prune audit events older than ?before=<rfc3339> (v1.86+).
      tags:
        - schedules
  /api/v1/schedules/bulk/disable:
    post:
      description: No body. Returns count of state transitions (already-disabled schedules are no-ops). Used for planned-maintenance windows.
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
          description: '{affected, failed_audits, target_state}.'
        "503":
          description: Schedule store unavailable.
      summary: Bulk-disable every schedule (v1.95+).
      tags:
        - schedules
  /api/v1/schedules/bulk/enable:
    post:
      description: No body. Returns count of state transitions (already-enabled schedules are no-ops).
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
          description: '{affected, failed_audits, target_state}.'
        "503":
          description: Schedule store unavailable.
      summary: Bulk-enable every schedule (v1.95+).
      tags:
        - schedules
  /api/v1/schedules/preview:
    post:
      description: 'Body: CreateScheduleRequest. Query param: count (1..10, default 1; v1.79+). Returns next_fire_at + next_fires[] + timezone. Validation mirrors POST /schedules.'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
          description: Preview payload.
        "400":
          description: Validation error.
        "503":
          description: Schedule store unavailable.
      summary: Preview next fire(s) for a schedule (v1.77+).
      tags:
        - schedules
  /api/v1/scoring:
    get:
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
          description: Envelope payload.
      summary: Default scoring weights + severity thresholds.
      tags:
        - scoring
  /api/v1/stream:
    get:
      description: 'text/event-stream with `event:`, `id:`, `data:` lines. Event kinds: `finding`, `run_start`, `run_end`, `audit`. Payloads are JSON objects; schema per-kind is documented in internal/web/stream/findings_bridge.go.'
      responses:
        "200":
          description: SSE-framed event stream.
        "503":
          description: Live feed unavailable (broadcaster not wired).
      summary: Server-Sent Events feed (findings / runs / audit).
      tags:
        - stream
  /api/v1/triage:
    get:
      description: Returns an array of {severity, count} objects, ordered critical → info. Empty severities are omitted.
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
          description: Envelope payload.
        "503":
          description: DB backend unavailable.
      summary: Per-severity finding counts for the triage panel.
      tags:
        - triage
  /healthz:
    get:
      responses:
        "200":
          description: Process is up.
      summary: Liveness probe.
  /readyz:
    get:
      responses:
        "200":
          description: Ready to serve traffic (degraded without DB).
      summary: Readiness probe.
servers:
  - url: http://127.0.0.1:8787
