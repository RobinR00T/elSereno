name: supply-chain

# Disabled 2026-04-23 — no paid Actions billing. Original triggers
# preserved below. workflow_dispatch stays so operators can still
# run this on demand from the UI.
#
# Original auto-triggers:
#   pull_request:
#   push:
#     branches: [main]
#     tags: ["v*"]
#   schedule:
#     - cron: "0 4 * * *"
on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  security-events: write

concurrency:
  group: supply-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scorecard:
    name: OpenSSF Scorecard
    runs-on: ubuntu-latest
    # Scorecard's SARIF upload into the Security tab requires
    # GitHub Advanced Security, which is free on public repos
    # but paid for private personal repos. Gate on public to
    # avoid noise on the private pre-1.0 period.
    if: github.event.repository.visibility == 'public' || github.event_name == 'workflow_dispatch'
    permissions:
      security-events: write
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: false
      - uses: actions/upload-artifact@v7
        with:
          name: scorecard-sarif
          path: results.sarif
      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif

  provenance-verify:
    name: SLSA provenance (release only)
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      attestations: read
    steps:
      - uses: actions/checkout@v4
      - name: install slsa-verifier
        run: |
          go install github.com/slsa-framework/slsa-verifier/v2/cli/slsa-verifier@latest
      - name: verify attached provenance
        run: |
          set -e
          tag="${GITHUB_REF_NAME}"
          echo "verifying artefacts for $tag"
          # Artefact names match `.goreleaser.yml` name_template.
          for os in linux darwin; do
            for arch in amd64 arm64; do
              for variant in default offensive; do
                artefact="elsereno_${tag#v}_${os}_${arch}.tar.gz"
                prov="${artefact}.intoto.jsonl"
                if [ -f "dist/${artefact}" ] && [ -f "dist/${prov}" ]; then
                  slsa-verifier verify-artifact "dist/${artefact}" \
                    --provenance-path "dist/${prov}" \
                    --source-uri "github.com/${GITHUB_REPOSITORY}" \
                    --source-tag "${tag}"
                fi
              done
            done
          done

  dependency-review:
    name: dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          config-file: ./.github/dependency-review-config.yml
          fail-on-severity: high
          comment-summary-in-pr: on-failure

  osv-scanner:
    name: osv-scanner
    # osv-scanner-action uploads SARIF which needs GHAS on
    # private repos. Gate to public; govulncheck in ci.yml
    # covers the CVE surface for the private period.
    if: github.event.repository.visibility == 'public' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google/osv-scanner-action/osv-scanner-action@v2.0.3
        with:
          scan-args: |-
            -r
            --skip-git
            ./

  licenses-audit:
    name: license audit (deny list)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true
      - name: install go-licenses
        run: go install github.com/google/go-licenses@latest
      - name: deny forbidden + restricted
        run: go-licenses check ./... --disallowed_types=forbidden,restricted
      - name: emit report artifact
        # go-licenses csv emits a three-column CSV (module,
        # license type, license url) natively — avoids the
        # template-literal "\n" YAML-escaping footgun that made
        # the previous `--template` variant fail silently.
        run: go-licenses csv ./... > licenses.csv
      - uses: actions/upload-artifact@v7
        with:
          name: licenses-report
          path: licenses.csv
