name: audit

# Proactive validation gate for the failure classes catalogued in
# memory/elsereno_operational_playbook.md.
#
# Runs scripts/audit.sh on every push to main + every PR. Catches:
#   - YAML syntax/schema regressions (dependabot.yml empty arrays, etc.)
#   - Broken internal markdown links
#   - Missing Go toolchain pin (CVE risk)
#   - Build / lint / test / gosec / govulncheck regressions
#
# This workflow MUST NEVER be skipped on main — that's its whole job.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Weekly run so a stdlib CVE landing AFTER we merge can still be caught.
  schedule:
    - cron: '0 6 * * 1'   # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # so SARIF-class tools can upload

concurrency:
  group: audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so `git log origin/main..HEAD` checks work
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Install audit dependencies
        run: |
          set -euo pipefail
          # govulncheck
          go install golang.org/x/vuln/cmd/govulncheck@latest
          # gosec — same source as ci.yml (securego/gosec@master)
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          # golangci-lint v2.11.4 — matches ci.yml exactly (PITF-031:
          # local + CI versions must agree to catch real regressions).
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b "$(go env GOPATH)/bin" v2.11.4
          # PATH already includes GOPATH/bin via setup-go
          # Ruby ships with ubuntu-latest, used by audit.sh for YAML validation
          ruby --version
          # gh ships with ubuntu-latest, but check
          gh --version
          # Sanity: print pinned versions
          golangci-lint --version
          gosec --version 2>&1 || true

      - name: Run audit.sh --ci
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/audit.sh --ci

      - name: Dump audit logs on failure
        if: failure()
        run: |
          set +e
          echo "::group::audit-lint log"
          tail -200 /tmp/.audit-lint.* 2>/dev/null || echo "(no lint log)"
          echo "::endgroup::"
          echo "::group::audit-gosec log"
          tail -200 /tmp/.audit-gosec.* 2>/dev/null || echo "(no gosec log)"
          echo "::endgroup::"
          echo "::group::audit-test log"
          tail -200 /tmp/.audit-test.* 2>/dev/null || echo "(no test log)"
          echo "::endgroup::"
          echo "::group::audit-context log"
          tail -200 /tmp/.audit-context.* 2>/dev/null || echo "(no context-check log)"
          echo "::endgroup::"

      - name: Upload audit logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: audit-logs
          path: /tmp/.audit-*
          if-no-files-found: ignore
          retention-days: 7
