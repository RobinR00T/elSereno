name: audit

# Proactive validation gate for the failure classes catalogued in
# memory/elsereno_operational_playbook.md.
#
# Runs scripts/audit.sh on every push to main + every PR. Catches:
#   - YAML syntax/schema regressions (dependabot.yml empty arrays, etc.)
#   - Broken internal markdown links
#   - Missing Go toolchain pin (CVE risk)
#   - Build / lint / test / gosec / govulncheck regressions
#
# This workflow MUST NEVER be skipped on main — that's its whole job.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Weekly run so a stdlib CVE landing AFTER we merge can still be caught.
  schedule:
    - cron: '0 6 * * 1'   # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # so SARIF-class tools can upload

concurrency:
  group: audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so `git log origin/main..HEAD` checks work
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Install audit dependencies
        run: |
          set -euo pipefail
          # govulncheck
          go install golang.org/x/vuln/cmd/govulncheck@latest
          # gosec
          curl -sfL https://raw.githubusercontent.com/securego/gosec/master/install.sh | sh -s -- -b /usr/local/bin v2.21.4
          # golangci-lint
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b /usr/local/bin v2.5.0
          # Ruby ships with ubuntu-latest, used by audit.sh for YAML validation
          ruby --version
          # gh ships with ubuntu-latest, but check
          gh --version

      - name: Run audit.sh --ci
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/audit.sh --ci

      - name: Upload audit logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: audit-logs
          path: /tmp/.audit-*
          if-no-files-found: ignore
          retention-days: 7
