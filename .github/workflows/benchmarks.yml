name: benchmarks

# Disabled 2026-04-23 — no paid Actions billing. Original triggers
# preserved below. workflow_dispatch stays so operators can still
# run this on demand from the UI.
#
# Original auto-triggers:
#   pull_request:
#     paths:
#       - '**.go'
#       - 'go.mod'
#       - 'go.sum'
#       - 'benchmarks/**'
#       - '.github/workflows/benchmarks.yml'
#   schedule:
#     - cron: "0 5 * * *"
on:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: bench-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regression:
    name: regression vs baseline
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true
      - name: install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest
      - name: current vs baseline
        id: stat
        run: |
          set +e
          make bench-regression > regression.out 2>&1
          rc=$?
          cat regression.out
          echo "exit=$rc" >> "$GITHUB_OUTPUT"
          # Soft-fail while the baseline is young — enable strict
          # mode by setting BENCH_STRICT=1 at the workflow level.
          if [ "${BENCH_STRICT:-0}" = "1" ] && [ "$rc" != "0" ]; then
            exit "$rc"
          fi
      - uses: actions/upload-artifact@v7
        with:
          name: benchstat-report
          path: |
            benchmarks/baseline.txt
            benchmarks/current.txt
            regression.out
          if-no-files-found: warn
      - name: comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const out = fs.readFileSync('regression.out', 'utf8').slice(-60000);
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "<details><summary>benchstat vs baseline</summary>\n\n```\n" + out + "\n```\n</details>"
            });
