name: nightly

# Disabled 2026-04-23 — no paid Actions billing. Original schedule
# preserved below. workflow_dispatch stays so operators can run it
# on demand.
#
# Original schedule:
#   schedule:
#     - cron: "0 3 * * *"
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # discover-fuzz emits the matrix of (pkg, target) pairs the
  # fuzz-long job consumes. Keeping discovery server-side means new
  # targets show up in nightly the minute they are committed.
  discover-fuzz:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.find.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - id: find
        run: |
          pairs=$(
            grep -rhEo 'func (Fuzz[A-Za-z0-9_]+)' --include='*_test.go' . \
              | awk '{print $2}' | sort -u \
              | while read -r fn; do
                  for p in $(grep -rlE "func ${fn}\\b" --include='*_test.go' . \
                       | xargs -n1 dirname | sort -u); do
                    printf '{"pkg":"./%s","target":"%s"}\n' "${p#./}" "$fn"
                  done
                done \
              | jq -s -c '.'
          )
          echo "matrix=${pairs:-[]}" >> "$GITHUB_OUTPUT"

  fuzz-long:
    needs: discover-fuzz
    if: ${{ needs.discover-fuzz.outputs.matrix != '[]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.discover-fuzz.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          cache: true
      - name: fuzz ${{ matrix.target.target }} (30 m)
        run: go test -run=^$ -fuzz="^${{ matrix.target.target }}$" -fuzztime=30m ${{ matrix.target.pkg }}
      - name: upload crash corpus
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-corpus-${{ matrix.target.target }}
          path: ${{ matrix.target.pkg }}/testdata/fuzz/${{ matrix.target.target }}
          if-no-files-found: ignore

  mutation:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          cache: true
      - name: install gremlins
        run: go install github.com/go-gremlins/gremlins/cmd/gremlins@latest
      # Config lives in .gremlins.yaml. Kept report-only for F7
      # (surface mutation kill-rate without blocking main) — F8 will
      # tighten to `--threshold-efficacy 70`.
      - run: gremlins unleash ./... | tee mutation-report.txt || true
      - uses: actions/upload-artifact@v7
        with:
          name: gremlins-report
          path: mutation-report.txt
          if-no-files-found: warn

  trufflehog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified

  dep-freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          cache: true
      - name: outdated direct deps
        run: |
          go list -m -u -json all \
            | jq -r 'select(.Update != null and .Indirect != true) | "\(.Path) \(.Version) -> \(.Update.Version)"' \
            || true
