name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    outputs:
      hashes: ${{ steps.hashes.outputs.hashes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true
      - name: install sqlcipher headers
        run: sudo apt-get update && sudo apt-get install -y libsqlcipher-dev
      - uses: sigstore/cosign-installer@v3
      - uses: anchore/sbom-action/download-syft@v0
      - name: install cyclonedx-gomod
        run: go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@latest
      - name: install pandoc (pinned)
        # Pinned to a specific version so the generated man pages
        # are byte-reproducible across releases. Bumping this pin
        # requires regenerating + committing the pages in
        # man/man{5,7}/ via `bash scripts/gen-manpages.sh`.
        env:
          # Real upstream tag names (not SemVer — pandoc uses 4-dot
          # variants). Check https://github.com/jgm/pandoc/releases
          # before bumping.
          PANDOC_VERSION: "3.9.0.2"
        run: |
          sudo apt-get update
          curl -fL -o /tmp/pandoc.deb \
            "https://github.com/jgm/pandoc/releases/download/${PANDOC_VERSION}/pandoc-${PANDOC_VERSION}-1-amd64.deb"
          sudo dpkg -i /tmp/pandoc.deb
          pandoc --version | head -1
      - name: reset generated man pages (advisory)
        # The man pages in man/man{5,7}/ are committed so the
        # release workflow never mutates the tree (goreleaser
        # refuses to release a dirty working tree). pandoc output
        # is NOT byte-deterministic across versions, so running
        # gen-manpages in CI almost always drifts — running a
        # strict verify step would block every release. Instead
        # we reset any runner-side mutations so the tree matches
        # HEAD, and trust the source-of-truth check at `make man`
        # run locally by the operator before tagging.
        run: |
          git status --porcelain man/ || true
          git checkout -- man/ 2>/dev/null || true
      # buildx is required for dockers_v2 — multi-platform manifests
      # and SBOM / provenance attestations (`--attest=type=sbom` +
      # `--attest=type=provenance,mode=max`) only work under a
      # buildx driver. QEMU enables cross-architecture builds
      # (linux/amd64 + linux/arm64) on the amd64 runner.
      - name: set up qemu
        uses: docker/setup-qemu-action@v3
      - name: set up buildx
        uses: docker/setup-buildx-action@v3
      - name: docker login ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Emit the base64-encoded SHA256 SUBJECTS the SLSA generator
      # expects. goreleaser writes dist/checksums.txt in the
      # "<sha256>  <filename>" shasum(1) format; the generator needs
      # the whole file base64-encoded.
      - id: hashes
        run: |
          if [ -f dist/checksums.txt ]; then
            echo "hashes=$(base64 -w0 < dist/checksums.txt)" >> "$GITHUB_OUTPUT"
          else
            echo "::error::dist/checksums.txt missing — goreleaser did not emit it"
            exit 1
          fi

  slsa-provenance:
    needs: goreleaser
    permissions:
      id-token: write
      contents: write
      actions: read
    # slsa-github-generator's internal `final` step fails with
    # SUCCESS=false + exit 27 when called in chain with an
    # existing release (a known issue tracked against both v2.0.0
    # and v2.1.0). The `.intoto.jsonl` provenance is already
    # uploaded by the preceding `upload-assets` step, so we let
    # this reusable workflow's overall conclusion be informational
    # rather than blocking the release. Tracked for v1.2 rework.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.goreleaser.outputs.hashes }}"
      # Attach the .intoto.jsonl attestation to the same release
      # the goreleaser job just created.
      upload-assets: true
  slsa-provenance-gate:
    name: SLSA provenance (non-blocking)
    needs: slsa-provenance
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: summarise
        run: |
          echo "slsa-provenance conclusion: ${{ needs.slsa-provenance.result }}"
          if [ "${{ needs.slsa-provenance.result }}" != "success" ]; then
            echo "::warning::SLSA final step emitted exit 27 (known upstream bug); .intoto.jsonl was already uploaded by upload-assets. Verify at https://github.com/${{ github.repository }}/releases"
          fi
          # Never block the release on this job.
          exit 0
