name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    outputs:
      hashes: ${{ steps.hashes.outputs.hashes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true
      - name: install sqlcipher headers
        run: sudo apt-get update && sudo apt-get install -y libsqlcipher-dev
      - uses: sigstore/cosign-installer@v3
      - uses: anchore/sbom-action/download-syft@v0
      - name: install cyclonedx-gomod
        run: go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@latest
      - name: install pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc
      - name: reset generated man pages (advisory)
        # The man pages in man/man{5,7}/ are committed so the
        # release workflow never mutates the tree (goreleaser
        # refuses to release a dirty working tree). pandoc output
        # is NOT byte-deterministic across versions, so running
        # gen-manpages in CI almost always drifts — running a
        # strict verify step would block every release. Instead
        # we reset any runner-side mutations so the tree matches
        # HEAD, and trust the source-of-truth check at `make man`
        # run locally by the operator before tagging.
        run: |
          git status --porcelain man/ || true
          git checkout -- man/ 2>/dev/null || true
      - name: docker login ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Emit the base64-encoded SHA256 SUBJECTS the SLSA generator
      # expects. goreleaser writes dist/checksums.txt in the
      # "<sha256>  <filename>" shasum(1) format; the generator needs
      # the whole file base64-encoded.
      - id: hashes
        run: |
          if [ -f dist/checksums.txt ]; then
            echo "hashes=$(base64 -w0 < dist/checksums.txt)" >> "$GITHUB_OUTPUT"
          else
            echo "::error::dist/checksums.txt missing — goreleaser did not emit it"
            exit 1
          fi

  slsa-provenance:
    needs: goreleaser
    permissions:
      id-token: write
      contents: write
      actions: read
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.0.0
    with:
      base64-subjects: "${{ needs.goreleaser.outputs.hashes }}"
      # Attach the .intoto.jsonl attestation to the same release
      # the goreleaser job just created.
      upload-assets: true
