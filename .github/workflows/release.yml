name: release

# Disabled 2026-04-23 — the project publishes releases via local
# goreleaser build + `gh release upload` (see RELEASING.md) rather
# than CI-built releases, to keep the project on the GitHub free
# tier without per-minute Actions billing.
#
# Original trigger:
#   on:
#     push:
#       tags: ["v*"]
on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  packages: write
  attestations: write   # v1.2: actions/attest-build-provenance@v2

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          cache: true
      - uses: sigstore/cosign-installer@v3
      - uses: anchore/sbom-action/download-syft@v0
      - name: install cyclonedx-gomod
        run: go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@latest
      - name: install pandoc (pinned)
        # Pinned to a specific version so the generated man pages
        # are byte-reproducible across releases. Bumping this pin
        # requires regenerating + committing the pages in
        # man/man{5,7}/ via `bash scripts/gen-manpages.sh`.
        env:
          # Real upstream tag names (not SemVer — pandoc uses 4-dot
          # variants). Check https://github.com/jgm/pandoc/releases
          # before bumping.
          PANDOC_VERSION: "3.9.0.2"
        run: |
          sudo apt-get update
          curl -fL -o /tmp/pandoc.deb \
            "https://github.com/jgm/pandoc/releases/download/${PANDOC_VERSION}/pandoc-${PANDOC_VERSION}-1-amd64.deb"
          sudo dpkg -i /tmp/pandoc.deb
          pandoc --version | head -1
      - name: reset generated man pages (advisory)
        # The man pages in man/man{5,7}/ are committed so the
        # release workflow never mutates the tree (goreleaser
        # refuses to release a dirty working tree). pandoc output
        # is NOT byte-deterministic across versions, so running
        # gen-manpages in CI almost always drifts — running a
        # strict verify step would block every release. Instead
        # we reset any runner-side mutations so the tree matches
        # HEAD, and trust the source-of-truth check at `make man`
        # run locally by the operator before tagging.
        run: |
          git status --porcelain man/ || true
          git checkout -- man/ 2>/dev/null || true
      # buildx is required for dockers_v2 — multi-platform manifests
      # and SBOM / provenance attestations (`--attest=type=sbom` +
      # `--attest=type=provenance,mode=max`) only work under a
      # buildx driver. QEMU enables cross-architecture builds
      # (linux/amd64 + linux/arm64) on the amd64 runner.
      - name: set up qemu
        uses: docker/setup-qemu-action@v3
      - name: set up buildx
        uses: docker/setup-buildx-action@v3
      - name: docker login ghcr
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # v1.2: drop the slsa-framework/slsa-github-generator
      # reusable workflow (exit-27 bug tracked since v2.0.0 and
      # still present in v2.1.0 — see
      # github.com/slsa-framework/slsa-github-generator/issues/2610).
      # Use GitHub's native actions/attest-build-provenance@v2
      # instead. Produces a SLSA v1.0 predicate + Sigstore keyless
      # signature, attached to the GitHub Attestations API + the
      # release page. Consumers verify with:
      #
      #   gh attestation verify elsereno_vX.Y.Z_linux_amd64.tar.gz \
      #       --repo RobinR00T/elSereno
      #
      # or, for cosign users:
      #
      #   cosign verify-attestation --type slsaprovenance1 \
      #       --certificate-identity-regexp '…' --certificate-oidc-issuer '…' \
      #       <artifact>
      - name: attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          # All goreleaser archives under dist/ get attestation.
          # `subject-path` accepts glob. The docker manifest gets
          # its own cosign attestation via goreleaser's docker_signs.
          subject-path: |
            dist/elsereno_*.tar.gz
            dist/elsereno_*.zip
            dist/checksums.txt
          # Keep the attestation on the release page as well (not
          # just in the Attestations API) so operators who pull
          # tarballs + verify offline have a local file to check.
          show-summary: true
