name: codeql

# Disabled 2026-04-23 — no paid Actions billing. Original triggers
# preserved below for restoration.
#
# Original:
#   on:
#     pull_request:
#     push:
#       branches: [main]
#     workflow_call:
#     schedule:
#       - cron: "0 4 * * 1"
on:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [go]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          cache: true
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3
